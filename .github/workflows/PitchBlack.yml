name: PitchBlack - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'PitchBlack Branch'
        required: true
        default: 'android-12.1'
        type: choice
        options:
        - android-12.1
        - android-11
        - android-9.0
      DEVICE_TREE:
        description: 'Custom Recovery Tree'
        required: true
        default: 'https://github.com/R0Xofficial/android_device_samsung_r8q'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'pbrp_12.1'
      DEVICE_PATH:
        description: 'Specify your device path.'
        required: true
        default: 'device/samsung/r8q'
      DEVICE_NAME:
        description: 'Specify your Device Codename.'
        required: true
        default: 'r8q'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      LDCHECK:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'
      RECOVERY_TAR:
        description: 'Release recovery.tar For Samsung devices'
        required: false
        default: true
        type: boolean
      RECOVERY_INSTALLER:
        description: 'Include recovery installer zip'
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: Build PBRP by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Display Inputs
      run: |
        echo "::group::User Environment Variables"
        echo "Displaying variables/inputs."
        echo "Include Recovery Installer: ${{ github.event.inputs.RECOVERY_INSTALLER }}"
        echo "Release recovery.tar For Samsung devices: ${{ github.event.inputs.RECOVERY_TAR }}"
        echo "::endgroup::"

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
  
    - name: Build Environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/bin/repo
        sudo chmod a+x /usr/bin/repo
  
    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/PBRP
        cd ${GITHUB_WORKSPACE}/PBRP
        git config --global user.name "R0Xofficial"
        git config --global user.email "patryk.bieganski1003@gmail.com"
        repo init -u https://github.com/PitchBlackRecoveryProject/manifest_pb.git -b ${{ github.event.inputs.MANIFEST_BRANCH }}
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle --optimized-fetch --prune

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/PBRP
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Check Manifest Branch
      uses: haya14busa/action-cond@v1
      id: pbrp_branch
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'android-11' || github.event.inputs.MANIFEST_BRANCH == 'android-12.1' }}
        if_true: lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng && make clean && mka adbd ${{ github.event.inputs.BUILD_TARGET }}image
        if_false: lunch omni_${{ github.event.inputs.DEVICE_NAME }}-eng && make clean && mka ${{ github.event.inputs.BUILD_TARGET }}image
  
    - name: Building PitchBlack
      run: |
        cd ${GITHUB_WORKSPACE}/PBRP
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        ${{ steps.pbrp_branch.outputs.value }}

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        DEVICE_TREE_URL="${{ github.event.inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

    - name: Check if Recovery Exist
      run: |
        cd ${GITHUB_WORKSPACE}/PBRP/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        if [ -f ${{ github.event.inputs.BUILD_TARGET }}.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/PBRP/out/target/product/${{ github.event.inputs.DEVICE_NAME }}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum ${{ github.event.inputs.BUILD_TARGET }}.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
            echo "RECOVERY_TYPE=${{ github.event.inputs.BUILD_TARGET }}" >> $GITHUB_ENV
        else
            echo "Recovery out directory is empty."
            exit 1
        fi
  
    - name: Recovery to tar for Samsung devices
      if: github.event.inputs.RECOVERY_TAR == true || github.event.inputs.RECOVERY_TAR == 'true'
      run: |
        cd ${{ env.FILE_PATH }}
        if [ "${{ env.RECOVERY_TYPE }}.img" != "recovery.img" ]; then
          cp ${{ env.RECOVERY_TYPE }}.img recovery.img
        fi
        tar -cvf ${{ env.RECOVERY_TYPE }}.tar recovery.img
      continue-on-error: true
    
    - name: Recovery to tar for Samsung devices
      if: github.event.inputs.RECOVERY_TAR == true || github.event.inputs.RECOVERY_TAR == 'true'
      run: |
        cd ${{ env.FILE_PATH }}
        cp ${{ env.RECOVERY_TYPE }}.img recovery.img
        tar -cvf ${{ env.RECOVERY_TYPE }}.tar recovery.img
        ls -lh ${{ env.RECOVERY_TYPE }}.tar
      continue-on-error: true

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.img
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.tar
          ${{ env.FILE_PATH }}/recovery-installer.zip
          ${{ env.FILE_PATH }}/PBRP*.zip
        name: Unofficial PitchBlack for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: [Device Tree/Branch](${{ github.event.inputs.DEVICE_TREE }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ github.event.inputs.DEVICE_TREE }}/commit/${{ env.COMMIT_ID }}) during building.
      
    - name: Release ramdisk-recovery
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.FILE_PATH }}/obj/PACKAGING/vendor_ramdisk_fragments_intermediates/recovery.*
          ${{ env.FILE_PATH }}/ramdisk-recovery.*
        name: Unofficial PitchBlack for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Target: ${{ env.RECOVERY_TYPE }}.img
          Build: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.
          MD5 (img): ${{ env.MD5_IMG }}
      
    - name: Run LDCheck
      run: |
        cd ${GITHUB_WORKSPACE}/PBRP
        cd tools
        mv -n libneeds ${{ env.FILE_PATH }}/recovery/root/
        mv -n ldcheck ${{ env.FILE_PATH }}/recovery/root/
        cd ${{ env.FILE_PATH }}/recovery/root/
        python3 ldcheck -p system/lib64:vendor/lib64:system/lib:vendor/lib -d ${{ github.event.inputs.LDCHECK }}
      continue-on-error: true
